<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ffe066"/>
      <stop offset="65%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bgGrad)"/>

  <!-- Outer glow -->
  <ellipse cx="96" cy="118" rx="52" ry="44" fill="url(#outerGlow)" filter="url(#blur2)"/>

  <!-- Main flame body -->
  <path d="M96 38 C88 55 70 62 68 82 C66 96 74 108 82 114 C78 104 80 94 88 90 C84 102 86 114 96 122 C106 114 108 102 104 90 C112 94 114 104 110 114 C118 108 126 96 124 82 C122 62 104 55 96 38Z" fill="url(#coreGrad)"/>

  <!-- Inner bright core -->
  <path d="M96 68 C92 76 84 82 84 92 C84 102 90 110 96 114 C102 110 108 102 108 92 C108 82 100 76 96 68Z" fill="#fff9e6" opacity="0.7" filter="url(#blur1)"/>

  <!-- Small side flames -->
  <path d="M75 85 C70 90 68 98 72 106 C76 100 76 92 80 88Z" fill="#ff8c00" opacity="0.7"/>
  <path d="M117 85 C122 90 124 98 120 106 C116 100 116 92 112 88Z" fill="#ff8c00" opacity="0.7"/>

  <!-- Tiny sparkles -->
  <circle cx="80" cy="60" r="2.5" fill="#ffe066" opacity="0.8"/>
  <circle cx="112" cy="52" r="2" fill="#ff9500" opacity="0.7"/>
  <circle cx="96" cy="44" r="1.5" fill="#ffffff" opacity="0.6"/>
</svg>
